name: CI

on:
  push:
    branches: [main, prod]
  pull_request:
    branches: [main]

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest, ubuntu-22.04]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute build version
        id: ver
        shell: bash
        run: |
          # Dev builds: <cargo version>-dev.<run_number>+sha.<short_sha>
          base=$(grep -m1 '^version' src-tauri/Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          short_sha=$(echo "${GITHUB_SHA}" | cut -c1-7)
          version="${base}-dev.${GITHUB_RUN_NUMBER}+sha.${short_sha}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Resolved PROSSH_BUILD_VERSION=${version}"

      - name: Install system deps (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev \
            pkg-config

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cargo check
        working-directory: src-tauri
        env:
          PROSSH_BUILD_VERSION: ${{ steps.ver.outputs.version }}
        run: cargo check

      - name: Cargo clippy
        working-directory: src-tauri
        env:
          PROSSH_BUILD_VERSION: ${{ steps.ver.outputs.version }}
        run: cargo clippy -- -D warnings
