name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Override build version (e.g. 0.1.0); defaults to the tag name when triggered by a git tag push."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            target: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            target: "aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            target: "x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
            target: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute build version
        id: ver
        shell: bash
        run: |
          # Priority: workflow_dispatch input > tag name (v1.2.3 → 1.2.3) > Cargo.toml
          input_ver="${{ inputs.version }}"
          if [ -n "$input_ver" ]; then
            version="$input_ver"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version=$(grep -m1 '^version' src-tauri/Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Resolved PROSSH_BUILD_VERSION=${version}"

      - name: Install system deps (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev \
            pkg-config

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Sync bundle version
        shell: bash
        run: node scripts/set-version.mjs "${{ steps.ver.outputs.version }}"

      - uses: dtolnay/rust-toolchain@stable
        with:
          # Install the matrix entry's cross-compilation target (Apple Silicon
          # runners need x86_64-apple-darwin installed explicitly to produce
          # Intel-mac bundles). For host-native builds this is an empty string.
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROSSH_BUILD_VERSION: ${{ steps.ver.outputs.version }}
          # Google Drive OAuth client baked into release bundles via
          # option_env! in src-tauri/src/sync/mod.rs. If the secrets are
          # unset (e.g. on a fork), option_env! resolves to None at compile
          # time and the build still succeeds — users just have to paste
          # their own credentials in Settings → Sync → Advanced.
          PROSSH_GOOGLE_CLIENT_ID: ${{ secrets.PROSSH_GOOGLE_CLIENT_ID }}
          PROSSH_GOOGLE_CLIENT_SECRET: ${{ secrets.PROSSH_GOOGLE_CLIENT_SECRET }}
          # Apple code signing + notarization. Consumed only by the macOS
          # matrix rows — on Linux/Windows these resolve to empty strings and
          # tauri-action skips signing.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ProSSH ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install."
          # Publish automatically — no manual "Publish release" click needed.
          releaseDraft: false
          # Tags with a dash (v0.1.0-rc.1, v0.1.0-alpha) are pre-releases;
          # plain semver tags (v0.1.0) go out as full releases.
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }}

      # tauri-action v0 uploads macOS updater tarballs as `ProSSH_<arch>.app.tar.gz`
      # — without the version — while every other artifact carries the version.
      # The fix landed on tauri-action's `dev` branch but hasn't shipped to a
      # `v0.x` release yet, so we post-process: delete the unversioned asset
      # and re-upload it under the versioned name.
      - name: Version macOS updater tarball name
        if: matrix.platform == 'macos-latest' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          version="${{ steps.ver.outputs.version }}"
          tag="${GITHUB_REF_NAME}"
          # tauri-action maps x86_64 → x64 on macOS; aarch64 is left as-is.
          case "${{ matrix.target }}" in
            aarch64-apple-darwin) arch=aarch64 ;;
            x86_64-apple-darwin)  arch=x64 ;;
            *) echo "Unknown macOS target: ${{ matrix.target }}" >&2; exit 1 ;;
          esac
          src="src-tauri/target/${{ matrix.target }}/release/bundle/macos/ProSSH.app.tar.gz"
          if [ ! -f "$src" ]; then
            echo "No updater tarball at $src — nothing to rename."
            exit 0
          fi
          old_name="ProSSH_${arch}.app.tar.gz"
          new_name="ProSSH_${version}_${arch}.app.tar.gz"
          tmp="${RUNNER_TEMP}/${new_name}"
          cp "$src" "$tmp"
          gh release delete-asset "$tag" "$old_name" --yes \
            --repo "${GITHUB_REPOSITORY}" 2>/dev/null || true
          gh release upload "$tag" "$tmp" --clobber \
            --repo "${GITHUB_REPOSITORY}"
          echo "Uploaded: $new_name"

  build-arch:
    # Separate job (rather than an extra matrix row) because Arch's tooling —
    # makepkg, pacman, bsdtar — doesn't map onto GitHub's ubuntu/macos/windows
    # runners. We run inside an official archlinux:base-devel container and
    # repack the .deb that `tauri build --bundles deb` produces into a native
    # pacman package.
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
      options: --user root
    steps:
      - name: Install system dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            git nodejs npm rust \
            webkit2gtk-4.1 gtk3 libappindicator-gtk3 librsvg openssl pkgconf \
            base-devel sudo github-cli

      - name: Create non-root builder user (makepkg refuses to run as root)
        run: |
          useradd -m -d /home/builder -s /bin/bash builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - uses: actions/checkout@v4

      - name: Compute build version
        id: ver
        shell: bash
        run: |
          # Same logic as the main matrix; additionally derive an Arch-safe
          # pkgver (makepkg forbids '-' in pkgver, so 0.1.0-rc.1 → 0.1.0rc.1).
          input_ver="${{ inputs.version }}"
          if [ -n "$input_ver" ]; then
            version="$input_ver"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version=$(grep -m1 '^version' src-tauri/Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          fi
          archver="${version//-/}"
          echo "version=${version}"     >> "$GITHUB_OUTPUT"
          echo "archver=${archver}"     >> "$GITHUB_OUTPUT"

      - name: Sync bundle version
        shell: bash
        run: node scripts/set-version.mjs "${{ steps.ver.outputs.version }}"

      - name: Build frontend and tauri .deb bundle
        shell: bash
        env:
          PROSSH_BUILD_VERSION: ${{ steps.ver.outputs.version }}
          # Same Google OAuth creds as the main matrix — option_env! reads
          # them at cargo compile time to embed into the binary.
          PROSSH_GOOGLE_CLIENT_ID: ${{ secrets.PROSSH_GOOGLE_CLIENT_ID }}
          PROSSH_GOOGLE_CLIENT_SECRET: ${{ secrets.PROSSH_GOOGLE_CLIENT_SECRET }}
        run: |
          set -euxo pipefail
          chown -R builder:builder "$GITHUB_WORKSPACE"
          # Single-quoted bash -c keeps the outer shell from expanding
          # $GITHUB_WORKSPACE and $PROSSH_BUILD_VERSION — sudo with
          # --preserve-env hands them through, and the inner bash does
          # the expansion.
          sudo -u builder \
            --preserve-env=GITHUB_WORKSPACE,PROSSH_BUILD_VERSION,PROSSH_GOOGLE_CLIENT_ID,PROSSH_GOOGLE_CLIENT_SECRET \
            bash -c '
              set -euxo pipefail
              cd "$GITHUB_WORKSPACE"
              npm ci
              # tauri build invokes beforeBuildCommand ("npm run build") itself
              npx tauri build --bundles deb
            '

      - name: Repack .deb → Arch .pkg.tar.zst
        shell: bash
        run: |
          set -euxo pipefail
          install -d -o builder -g builder /home/builder/pkg
          cp packaging/arch/PKGBUILD /home/builder/pkg/
          cp LICENSE /home/builder/pkg/
          find src-tauri/target/release/bundle/deb -name 'ProSSH_*.deb' \
            -exec cp {} /home/builder/pkg/ \;
          chown -R builder:builder /home/builder/pkg
          sudo -u builder bash -c "
            set -euxo pipefail
            cd /home/builder/pkg
            PROSSH_VERSION='${{ steps.ver.outputs.archver }}' makepkg -f --nodeps
            ls -la *.pkg.tar.zst
          "

      - name: Upload .pkg.tar.zst to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${GITHUB_REF_NAME}" /home/builder/pkg/*.pkg.tar.zst \
            --repo "${GITHUB_REPOSITORY}" --clobber
